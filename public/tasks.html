<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tasks — Asset Tracker</title>
<style>
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;
  --accent:#4f6ef7;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
  --text:#e2e8f0;--muted:#8892b0;--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap;
}
.logo{display:flex;align-items:center;gap:10px;font-size:1.1rem;font-weight:700;text-decoration:none;color:var(--text);}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:7px 14px;font-size:0.85rem;font-weight:600;color:var(--text);
  text-decoration:none;transition:border-color 0.15s;
}
.back-btn:hover{border-color:var(--accent);}
.user-badge{font-size:0.78rem;color:var(--muted);}
button{cursor:pointer;border:none;border-radius:8px;font-size:0.85rem;font-weight:600;padding:8px 16px;transition:opacity 0.15s;}
button:hover{opacity:0.87;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-sm{padding:5px 12px;font-size:0.78rem;}
.page{padding:28px 32px;max-width:1400px;margin:0 auto;}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:14px;}
.page-header-left h1{font-size:1.5rem;font-weight:800;margin-bottom:4px;}
.page-header-left p{color:var(--muted);font-size:0.85rem;}
.page-header-right{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
.stat-val{font-size:1.7rem;font-weight:800;line-height:1;}
.stat-lbl{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:4px;}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:20px;}
.toolbar input,.toolbar select{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:8px 13px;color:var(--text);font-size:0.85rem;outline:none;
}
.toolbar input{min-width:180px;}
.toolbar input:focus,.toolbar select:focus{border-color:var(--accent);}
.toolbar-label{font-size:0.75rem;color:var(--muted);font-weight:600;white-space:nowrap;}
.toolbar-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.seg-toggle{display:flex;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:3px;}
.seg-btn{
  background:transparent;color:var(--muted);border:none;border-radius:7px;
  padding:5px 13px;font-size:0.8rem;font-weight:600;
  transition:background 0.15s,color 0.15s;cursor:pointer;
}
.seg-btn.active{background:var(--accent);color:#fff;}
.sync-bar{
  display:flex;align-items:center;gap:10px;margin-bottom:16px;
  font-size:0.8rem;color:var(--muted);padding:8px 12px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
}
.sync-bar span{flex:1;}
.sm8-link{color:var(--accent);font-size:0.78rem;font-weight:600;text-decoration:none;}
.sm8-link:hover{text-decoration:underline;}
.loading-wrap{text-align:center;padding:60px 20px;color:var(--muted);}
.loader{
  display:inline-block;width:22px;height:22px;
  border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-wrap{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:2.8rem;margin-bottom:12px;}
.empty-wrap p{font-size:0.9rem;}
.task-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;}
.task-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:15px 18px;display:flex;gap:13px;align-items:flex-start;
  transition:border-color 0.18s,transform 0.15s,box-shadow 0.15s;
  position:relative;overflow:hidden;cursor:pointer;
}
.task-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:4px;border-radius:4px 0 0 4px;
}
.task-card.c-active::before{background:var(--accent);}
.task-card.c-overdue::before{background:var(--red);}
.task-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.25);}
.task-card.selected{border-color:var(--accent);background:rgba(79,110,247,0.07);}
.task-cb{width:17px;height:17px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;margin-top:3px;}
.task-body{flex:1;min-width:0;}
.title-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px;}
.task-title{font-weight:600;font-size:0.92rem;}
.badge{display:inline-block;font-size:0.67rem;font-weight:700;padding:2px 7px;border-radius:7px;white-space:nowrap;}
.badge.overdue{background:rgba(239,68,68,0.15);color:var(--red);}
.badge.task{background:rgba(79,110,247,0.12);color:var(--accent);}
.badge.section{background:rgba(124,58,237,0.12);color:#a78bfa;}
.badge.status-quote{background:rgba(245,158,11,0.13);color:var(--amber);}
.badge.status-wo{background:rgba(34,197,94,0.13);color:var(--green);}
.badge.status-completed{background:rgba(136,146,176,0.13);color:var(--muted);}
.badge.status-unsuccessful{background:rgba(239,68,68,0.13);color:var(--red);}
.meta-row{display:flex;flex-wrap:wrap;gap:10px;font-size:0.75rem;color:var(--muted);margin-bottom:5px;align-items:center;}
.task-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0;}
.due-pill{font-size:0.7rem;font-weight:700;padding:3px 9px;border-radius:10px;white-space:nowrap;}
.due-pill.overdue{background:rgba(239,68,68,0.15);color:var(--red);}
.due-pill.today{background:rgba(245,158,11,0.15);color:var(--amber);}
.due-pill.soon{background:rgba(79,110,247,0.1);color:var(--accent);}
.due-pill.ok{background:rgba(34,197,94,0.1);color:var(--green);}
.due-pill.none{background:rgba(136,146,176,0.08);color:var(--muted);}
.open-sm8-btn{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(79,110,247,0.1);border:1px solid rgba(79,110,247,0.25);
  border-radius:6px;padding:3px 8px;font-size:0.68rem;color:var(--accent);
  font-weight:600;text-decoration:none;white-space:nowrap;
}
.open-sm8-btn:hover{background:rgba(79,110,247,0.22);}
.staff-chip{
  display:inline-flex;align-items:center;gap:5px;
  border:1px solid;border-radius:20px;padding:2px 9px;
  font-size:0.74rem;font-weight:600;
}
.staff-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.staff-group{margin-bottom:24px;}
.staff-group-hdr{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:2px solid var(--border);margin-bottom:10px;
}
.staff-avatar{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.72rem;font-weight:800;color:#fff;flex-shrink:0;
}
.group-icon{font-size:1.2rem;line-height:1;flex-shrink:0;}
.staff-group-name{font-weight:700;font-size:0.95rem;flex:1;}
.staff-group-ct{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:1px 9px;font-size:0.72rem;color:var(--muted);
}
.bulk-bar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  background:var(--surface);border:1px solid var(--accent);
  border-radius:10px;padding:10px 16px;margin-bottom:12px;
}
.bulk-select-all{
  display:flex;align-items:center;gap:8px;
  font-size:0.82rem;font-weight:600;cursor:pointer;
  color:var(--text);user-select:none;
}
.bulk-select-all input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;}
.debug-panel{
  background:var(--surface2);border:1px solid var(--border);border-radius:10px;
  padding:14px;margin-bottom:20px;font-size:0.72rem;color:var(--muted);
  font-family:monospace;white-space:pre-wrap;word-break:break-all;
  max-height:400px;overflow-y:auto;display:none;
}
.debug-panel.show{display:block;}
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.72);
  z-index:200;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;position:relative;
}
.modal-close{
  position:absolute;top:14px;right:14px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;color:var(--text);padding:4px 10px;font-size:1rem;cursor:pointer;
}
.modal-close:hover{border-color:var(--accent);}
.modal h3{font-size:1.1rem;font-weight:700;margin-bottom:16px;}
.modal-sm8-link{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(79,110,247,0.1);border:1px solid rgba(79,110,247,0.3);
  border-radius:8px;padding:7px 14px;font-size:0.82rem;font-weight:600;
  color:var(--accent);text-decoration:none;margin-bottom:18px;
}
.modal-sm8-link:hover{background:rgba(79,110,247,0.2);}
.frow{margin-bottom:14px;}
.frow label{display:block;font-size:0.72rem;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.05em;}
.frow textarea{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:9px 12px;color:var(--text);font-size:0.88rem;
  outline:none;font-family:inherit;resize:vertical;min-height:70px;
}
.frow textarea:focus{border-color:var(--accent);}
.frow .readonly-val{
  background:var(--surface2);border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;font-size:0.85rem;color:var(--muted);
}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap;}
#toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:13px 18px;font-size:0.88rem;
  z-index:400;transform:translateY(80px);opacity:0;
  transition:all 0.3s;max-width:320px;pointer-events:none;
}
#toast.show{transform:translateY(0);opacity:1;}
#auth-screen{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  min-height:calc(100vh - 70px);padding:32px;
}
#auth-screen.show{display:flex;}
.auth-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:40px;width:100%;max-width:420px;text-align:center;
}
.auth-card h2{margin-bottom:8px;}
.auth-card p{color:var(--muted);font-size:0.9rem;margin-bottom:24px;}
.auth-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  width:100%;padding:13px 24px;background:var(--accent);color:#fff;
  border-radius:10px;font-size:1rem;font-weight:700;text-decoration:none;
  border:none;cursor:pointer;
}
.auth-btn:hover{opacity:0.85;}
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
      <rect width="32" height="32" rx="8" fill="#4f6ef7"/>
      <path d="M8 22 L16 10 L24 22" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="16" cy="22" r="2.5" fill="white"/>
    </svg>
    Asset Tracker
  </a>
  <div class="header-right">
    <span class="user-badge" id="user-badge"></span>
    <a class="back-btn" href="index.html">&#8592; Dashboard</a>
    <a href="/api/logout" class="btn-ghost btn-sm" style="text-decoration:none;">Sign Out</a>
  </div>
</header>

<div id="auth-screen">
  <div class="auth-card">
    <h2>Session Expired</h2>
    <p>Please sign in again to continue.</p>
    <a class="auth-btn" href="index.html">&#8594; Sign In</a>
  </div>
</div>

<div class="page" id="main-page" style="display:none">

  <div class="page-header">
    <div class="page-header-left">
      <h1>&#10003; Tasks</h1>
      <p>Incomplete checklist tasks from ServiceM8.</p>
    </div>
    <div class="page-header-right">
      <button class="btn-ghost btn-sm" onclick="toggleDebug()">&#128269; Debug</button>
      <button class="btn-ghost btn-sm" onclick="loadTasks(true)">&#8635; Refresh</button>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="sync-bar">
    <span id="sync-detail">Loading&hellip;</span>
    <a class="sm8-link" href="https://go.servicem8.com" target="_blank" rel="noopener">&#128279; Open ServiceM8</a>
  </div>

  <div class="debug-panel" id="debug-panel">Loading&hellip;</div>

  <div class="toolbar">
    <!-- View scope -->
    <div class="toolbar-group">
      <span class="toolbar-label">View</span>
      <div class="seg-toggle">
        <button class="seg-btn active" id="ts-mine" onclick="setScope('mine')">&#128100; My Tasks</button>
        <button class="seg-btn"        id="ts-all"  onclick="setScope('all')">&#128101; All Staff</button>
      </div>
    </div>
    <!-- Sort -->
    <div class="toolbar-group">
      <span class="toolbar-label">Sort by</span>
        <div class="seg-toggle">
          <button class="seg-btn active" id="sort-due"    onclick="setSort('due')">&#128336; Due Date</button>
          <button class="seg-btn"        id="sort-staff"  onclick="setSort('staff')">&#128100; Staff</button>
          <button class="seg-btn"        id="sort-job"    onclick="setSort('job')">&#128188; Job</button>
          <button class="seg-btn"        id="sort-status" onclick="setSort('status')">&#127959; Status</button>
          <button class="seg-btn"        id="sort-name"   onclick="setSort('name')">&#128292; Name</button>
        </div>
    </div>
    <!-- Filters -->
    <input type="text" id="q-search" placeholder="&#128269; Search&hellip;" oninput="render()"/>
    <select id="q-staff"    onchange="render()"><option value="">All Staff</option></select>
    <select id="q-client"   onchange="render()"><option value="">All Clients</option></select>
    <select id="q-category" onchange="render()"><option value="">All Categories</option></select>
    <select id="q-status"   onchange="render()">
      <option value="">All Statuses</option>
      <option value="Quote">Quote</option>
      <option value="Work Order">Work Order</option>
      <option value="Unsuccessful">Unsuccessful</option>
      <option value="Completed">Completed</option>
    </select>
  </div>

  <!-- Bulk bar -->
  <div id="bulk-bar" style="display:none">
    <div class="bulk-bar">
      <label class="bulk-select-all">
        <input type="checkbox" id="bulk-select-all" onchange="toggleSelectAll(this.checked)"/>
        <span id="bulk-count">0 selected</span>
      </label>
      <div style="flex:1"></div>
      <button class="btn-ghost btn-sm" onclick="clearSelection()">Clear</button>
      <button class="btn-primary btn-sm" onclick="bulkComplete()">&#10003; Mark Selected Complete</button>
    </div>
  </div>

  <div id="task-body"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="onOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&#10005;</button>
    <h3>Task Detail</h3>
    <a class="modal-sm8-link" id="m-sm8-link" href="#" target="_blank" rel="noopener" style="display:none">
      &#128279; Open Job in ServiceM8
    </a>

    <!-- Task name — editable -->
    <div class="frow">
      <label>Task Name</label>
      <input type="text" id="m-name" style="
        width:100%;background:var(--surface2);border:1px solid var(--border);
        border-radius:8px;padding:9px 12px;color:var(--text);font-size:0.88rem;
        outline:none;font-family:inherit;
      " onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"/>
    </div>

    <!-- Due date — editable -->
    <div class="frow">
      <label>Due Date</label>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="date" id="m-due-date" oninput="updateDuePreview()" style="
          flex:1;background:var(--surface2);border:1px solid var(--border);
          border-radius:8px;padding:9px 12px;color:var(--text);font-size:0.88rem;
          outline:none;font-family:inherit;color-scheme:dark;
        " onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"/>
        <button class="btn-ghost btn-sm" onclick="clearDueDate()" title="Clear due date">&#10005; Clear</button>
      </div>
      <div id="m-due-preview" style="margin-top:5px;font-size:0.75rem;color:var(--muted);"></div>
    </div>

    <div class="frow" id="m-status-row" style="display:none">
      <label>Job Status</label>
      <div class="readonly-val" id="m-status"></div>
    </div>
    <div class="frow" id="m-category-row" style="display:none">
      <label>Category</label>
      <div class="readonly-val" id="m-category"></div>
    </div>
    <div class="frow" id="m-section-row" style="display:none">
      <label>Section</label>
      <div class="readonly-val" id="m-section"></div>
    </div>
    <div class="frow" id="m-job-row" style="display:none">
      <label>Linked Job</label>
      <div class="readonly-val" id="m-job-display"></div>
    </div>
    <div class="frow">
      <label>Assigned To</label>
      <div class="readonly-val" id="m-staff-display"></div>
    </div>
    <div class="frow" id="m-reminder-row" style="display:none">
      <label>Due / Reminder</label>
      <div class="readonly-val" id="m-reminder"></div>
    </div>
    <div class="frow">
      <label>Raw ServiceM8 Data</label>
      <textarea id="m-raw" style="font-family:monospace;font-size:0.72rem;min-height:120px;" readonly></textarea>
    </div>

    <div id="m-save-msg" style="font-size:0.78rem;font-weight:600;min-height:18px;margin-bottom:8px;"></div>

    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Close</button>
      <button class="btn-ghost" id="m-save-btn" onclick="saveTaskEdits()">&#128190; Save Changes</button>
      <button class="btn-primary" onclick="completeFromModal()">&#10003; Mark Complete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────
var tasksData       = [];
var rawDebugData    = [];
var rawCategoryData = [];
var rawCatNameMap   = {};
var staffList       = [];
var staffMap        = {};
var staffColorMap   = {};
var jobMap          = {};
var categoryMap     = {};
var assetList       = [];
var clientMap       = {};
var tasksLoaded     = false;
var tScope          = 'mine';
var sortMode        = 'due';
var selectedIds     = {};
var currentUser     = '';
var currentUserUuid = '';
var editRecord      = null;
var debugVisible    = false;

// Status sort order
var STATUS_ORDER = { 'Work Order':0, 'Quote':1, 'Unsuccessful':2, 'Completed':3 };

var STAFF_COLORS = [
  '#4f6ef7','#22c55e','#f59e0b','#ef4444','#a78bfa',
  '#06b6d4','#f97316','#ec4899','#84cc16','#14b8a6',
  '#8b5cf6','#fb923c','#e879f9','#34d399','#60a5fa'
];

// ── Boot ───────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  try { assetList = JSON.parse(localStorage.getItem('sm8_assets')  || '[]'); } catch(e){ assetList=[]; }
  try { clientMap = JSON.parse(localStorage.getItem('sm8_clients') || '{}'); } catch(e){ clientMap={}; }
  var id = readCookies();
  currentUser     = id.name || '';
  currentUserUuid = id.uuid || '';
  if (currentUser) document.getElementById('user-badge').textContent = '\uD83D\uDC64 ' + currentUser;
  checkSession();
});

function readCookies() {
  var r = { name:'', uuid:'' };
  document.cookie.split(';').forEach(function(c) {
    var p = c.trim().split('=');
    var k = p[0]; var v = decodeURIComponent(p.slice(1).join('='));
    if (k === 'sm8_user_name') r.name = v;
    if (k === 'sm8_user_uuid') r.uuid = v;
  });
  return r;
}

function checkSession() {
  fetch('/api/proxy?path=' + encodeURIComponent('/staff.json'), { credentials:'include' })
    .then(function(r) {
      if (r.status === 401) { showAuth(); return null; }
      return r.json();
    })
    .then(function(d) { if (d) { showMain(); loadTasks(false); } })
    .catch(function() { showAuth(); });
}

function showAuth() {
  document.getElementById('auth-screen').classList.add('show');
  document.getElementById('main-page').style.display = 'none';
}
function showMain() {
  document.getElementById('auth-screen').classList.remove('show');
  document.getElementById('main-page').style.display = 'block';
}

// ── Proxy ──────────────────────────────────────────────
function sm8Get(path) {
  return fetch('/api/proxy?path=' + encodeURIComponent(path), {
    credentials: 'include',
    headers: { 'Accept': 'application/json' }
  }).then(function(r) {
    if (r.status === 401) throw new Error('SESSION_EXPIRED');
    return r.json().then(function(d) {
      if (!r.ok) throw new Error(d.message || ('HTTP ' + r.status));
      return d;
    });
  });
}

function sm8Put(path, payload) {
  return fetch('/api/proxy?path=' + encodeURIComponent(path), {
    method: 'POST',
    credentials: 'include',
    headers: {
      'Accept': 'application/json',
      'Content-Type': 'application/json',
      'X-HTTP-Method-Override': 'PUT'
    },
    body: JSON.stringify(payload)
  });
}

// ── Load ───────────────────────────────────────────────
function loadTasks(force) {
  if (tasksLoaded && !force) return;
  tasksLoaded = false;
  selectedIds = {};
  updateBulkBar();
  setBody('<div class="loading-wrap"><span class="loader"></span><p style="margin-top:14px">Loading tasks&hellip;</p></div>');
  setSyncMsg('Loading&hellip;');

  Promise.all([
    sm8Get('/staff.json'),
    sm8Get('/job.json'),
    sm8Get('/jobchecklist.json'),
    sm8Get('/category.json')
  ]).then(function(res) {
    var rawStaff      = Array.isArray(res[0]) ? res[0] : [];
    var rawJobs       = Array.isArray(res[1]) ? res[1] : [];
    var rawItems      = Array.isArray(res[2]) ? res[2] : [];
    var rawCategories = Array.isArray(res[3]) ? res[3] : [];

    rawDebugData    = rawItems;
    rawCategoryData = rawCategories;

    // ── Staff
    staffList = rawStaff
      .filter(function(s) { return String(s.active) === '1'; })
      .map(function(s) {
        return { uuid: s.uuid, name: ((s.first||'') + ' ' + (s.last||'')).trim() || s.email || s.uuid };
      });
    staffMap = {};
    staffColorMap = {};
    staffList.forEach(function(s, idx) {
      staffMap[s.uuid]      = s.name;
      staffColorMap[s.uuid] = STAFF_COLORS[idx % STAFF_COLORS.length];
    });

    // ── Jobs — store _raw for debug, include status
    jobMap = {};
    rawJobs
      .filter(function(j) { return String(j.active) === '1'; })
      .forEach(function(j) {
        jobMap[j.uuid] = {
          _raw:       j,
          uuid:       j.uuid,
          number:     j.generated_job_id || '',
          desc:       j.job_description  || '',
          clientUuid: j.company_uuid     || '',
          status:     j.status           || '',
          catUuid:    j.category_uuid    || ''
        };
      });

    // ── Categories: uuid -> name
    rawCatNameMap = {};
    rawCategories
      .filter(function(c) { return String(c.active) === '1'; })
      .forEach(function(c) { rawCatNameMap[c.uuid] = c.name; });

    // ── Category map: job_uuid -> category name
    categoryMap = {};
    rawJobs
      .filter(function(j) { return String(j.active) === '1'; })
      .forEach(function(j) {
        var catUuid = j.category_uuid || j.job_category_uuid || '';
        if (catUuid && rawCatNameMap[catUuid]) {
          categoryMap[j.uuid] = rawCatNameMap[catUuid];
        }
      });

    // ── Checklist items
    tasksData = rawItems
      .filter(function(i) {
        if (String(i.active) !== '1') return false;
        var ts = String(i.completed_timestamp || '').trim();
        if (ts !== '' && ts !== '0000-00-00 00:00:00' && ts !== '0000-00-00') return false;
        if (i.item_type && String(i.item_type).toLowerCase() !== 'todo') return false;
        return true;
      })
      .map(function(i) {
        var job        = jobMap[i.job_uuid] || {};
        var clientUuid = job.clientUuid || '';
        var clientName = clientUuid ? (clientMap[clientUuid] || '') : '';
        var staffUuid  = '';
        if (Array.isArray(i.assigned_to_staff_uuids) && i.assigned_to_staff_uuids.length) {
          staffUuid = i.assigned_to_staff_uuids[0];
        }

        // Due date from absoluteDateTime
        var dueDate = '';
        if (i.reminder_type === 'ABSOLUTE_DATETIME' &&
            i.reminder_data && typeof i.reminder_data === 'object' &&
            i.reminder_data.absoluteDateTime) {
          dueDate = String(i.reminder_data.absoluteDateTime).substring(0, 10);
        }

        // Reminder display string
        var reminderData = '';
        if (i.reminder_data) {
          if (typeof i.reminder_data === 'object') {
            if (i.reminder_data.absoluteDateTime)      reminderData = i.reminder_data.absoluteDateTime;
            else if (i.reminder_data.relativeDateTime) reminderData = JSON.stringify(i.reminder_data.relativeDateTime);
            else                                        reminderData = JSON.stringify(i.reminder_data);
          } else {
            reminderData = String(i.reminder_data);
          }
        }

        return {
          _id:          i.uuid,
          _raw:         i,
          name:         i.name         || 'Unnamed Task',
          section:      i.section_name || '',
          itemType:     i.item_type    || '',
          staffUuid:    staffUuid,
          staffName:    staffMap[staffUuid]      || 'Unassigned',
          staffColor:   staffColorMap[staffUuid] || '#8892b0',
          dueDate:      dueDate,
          reminderType: i.reminder_type || '',
          reminderData: reminderData,
          jobUuid:      i.job_uuid   || '',
          jobNumber:    job.number   || '',
          jobDesc:      job.desc     || '',
          jobUuidSm8:   job.uuid     || '',
          jobStatus:    job.status   || '',
          clientName:   clientName,
          clientUuid:   clientUuid,
          category:     categoryMap[i.job_uuid] || ''
        };
      });

    tasksLoaded = true;

    var todoCount = rawItems.filter(function(i) {
      return String(i.active) === '1' && i.item_type && String(i.item_type).toLowerCase() === 'todo';
    }).length;

    setSyncMsg(
      'Last synced: ' + new Date().toLocaleTimeString() +
      ' \u2014 ' + rawItems.length + ' total records, ' +
      todoCount + ' active todos, ' +
      tasksData.length + ' incomplete tasks shown'
    );

    updateDebugPanel();
    populateFilters();
    render();

  }).catch(function(e) {
    if (e.message === 'SESSION_EXPIRED') { showAuth(); return; }
    setBody('<div class="empty-wrap"><div class="empty-icon">&#9888;</div>' +
            '<p>Failed to load: ' + esc(e.message) + '</p><br/>' +
            '<button class="btn-ghost" onclick="loadTasks(true)">Retry</button></div>');
    toast('Load failed: ' + e.message, true);
  });
}

function toggleDebug() {
  debugVisible = !debugVisible;
  document.getElementById('debug-panel').classList.toggle('show', debugVisible);
  updateDebugPanel();
}

function updateDebugPanel() {
  if (!debugVisible) return;
  var panel = document.getElementById('debug-panel');

  var typeCounts = {};
  rawDebugData.forEach(function(i){ var t=i.item_type||'(none)'; typeCounts[t]=(typeCounts[t]||0)+1; });
  var activeCount    = rawDebugData.filter(function(i){ return String(i.active)==='1'; }).length;
  var inactiveCount  = rawDebugData.filter(function(i){ return String(i.active)!=='1'; }).length;
  var completedCount = rawDebugData.filter(function(i){
    var ts=String(i.completed_timestamp||'').trim();
    return ts!==''&&ts!=='0000-00-00 00:00:00'&&ts!=='0000-00-00';
  }).length;

  var categoryKeys    = Object.keys(categoryMap);
  var tasksWithCat    = tasksData.filter(function(t){ return !!t.category; }).length;
  var tasksWithoutCat = tasksData.filter(function(t){ return !t.category; }).length;

  // Status breakdown
  var statusCounts = {};
  tasksData.forEach(function(t){
    var s = t.jobStatus || '(none)';
    statusCounts[s] = (statusCounts[s]||0)+1;
  });

  var sampleTask = tasksData.find(function(t){ return !!t.jobUuid; });
  var sampleLookup = 'No tasks with job_uuid found';
  var sampleJobRaw = 'n/a';
  if (sampleTask) {
    sampleLookup = 'Sample task job_uuid: ' + sampleTask.jobUuid +
                   '\n  categoryMap result: ' + (categoryMap[sampleTask.jobUuid] || '(not found)') +
                   '\n  jobStatus: ' + (sampleTask.jobStatus || '(none)');
    var jobEntry = jobMap[sampleTask.jobUuid];
    if (jobEntry && jobEntry._raw) {
      var raw = jobEntry._raw;
      var catFields = {};
      Object.keys(raw).forEach(function(k){
        if (k.toLowerCase().indexOf('cat') !== -1 ||
            k.toLowerCase().indexOf('status') !== -1 ||
            k.toLowerCase().indexOf('type') !== -1) {
          catFields[k] = raw[k];
        }
      });
      sampleJobRaw = 'Category/status-related fields:\n' +
        JSON.stringify(catFields, null, 2) +
        '\n\nFull job raw:\n' +
        JSON.stringify(raw, null, 2);
    }
  }

  panel.textContent =
    '── CHECKLIST ──────────────────────────\n' +
    'Total: '+rawDebugData.length+'  active=1: '+activeCount+'  active=0: '+inactiveCount+'\n'+
    'completed (real ts): '+completedCount+'\n\n'+
    'item_type breakdown:\n'+
    Object.keys(typeCounts).map(function(k){ return '  '+k+': '+typeCounts[k]; }).join('\n')+'\n\n'+

    '── JOB STATUS BREAKDOWN ───────────────\n'+
    Object.keys(statusCounts).map(function(k){ return '  '+k+': '+statusCounts[k]; }).join('\n')+'\n\n'+

    '── CATEGORY ENDPOINT ──────────────────\n'+
    'Total /category.json records: ' + rawCategoryData.length + '\n'+
    'Active categories in map: ' + Object.keys(rawCatNameMap).length + '\n'+
    'First category record:\n'+
    JSON.stringify(rawCategoryData[0] || 'none', null, 2)+'\n\n'+

    '── CATEGORY MAP ───────────────────────\n'+
    'categoryMap entries (job_uuid -> name): ' + categoryKeys.length + '\n'+
    'Tasks with category: ' + tasksWithCat + '\n'+
    'Tasks without category: ' + tasksWithoutCat + '\n\n'+
    sampleLookup + '\n\n'+
    'categoryMap sample (first 5):\n'+
    categoryKeys.slice(0,5).map(function(k){ return '  '+k+' -> '+categoryMap[k]; }).join('\n')+'\n\n'+

    '── SAMPLE JOB RAW ─────────────────────\n'+
    sampleJobRaw + '\n\n'+

    '── FIRST TODO ─────────────────────────\n'+
    JSON.stringify(
      rawDebugData.find(function(i){ return String(i.item_type).toLowerCase()==='todo'; }) || 'none',
      null, 2
    );
}

// ── Filters ────────────────────────────────────────────
function populateFilters() {
  // Staff
var ss = document.getElementById('q-staff');
var sv = ss.value;
ss.innerHTML = '<option value="">All Staff</option>';

// Add Unassigned option first
var unassignedOpt = document.createElement('option');
unassignedOpt.value = '__unassigned__';
unassignedOpt.textContent = 'Unassigned';
if (sv === '__unassigned__') unassignedOpt.selected = true;
ss.appendChild(unassignedOpt);

staffList.forEach(function(s) {
  var o = document.createElement('option');
  o.value = s.uuid; o.textContent = s.name;
  if (s.uuid === sv) o.selected = true;
  ss.appendChild(o);
});


  // Clients
  var cs = document.getElementById('q-client');
  var cv = cs.value;
  var seenC = {};
  tasksData.forEach(function(t) { if (t.clientUuid && t.clientName) seenC[t.clientUuid] = t.clientName; });
  cs.innerHTML = '<option value="">All Clients</option>';
  Object.keys(seenC).sort(function(a,b){ return seenC[a].localeCompare(seenC[b]); }).forEach(function(u) {
    var o = document.createElement('option');
    o.value = u; o.textContent = seenC[u];
    if (u === cv) o.selected = true;
    cs.appendChild(o);
  });

  // Categories
  var qs = document.getElementById('q-category');
  var qv = qs.value;
  var seenQ = {};
  tasksData.forEach(function(t) { if (t.category) seenQ[t.category] = true; });
  qs.innerHTML = '<option value="">All Categories</option>';
  Object.keys(seenQ).sort().forEach(function(c) {
    var o = document.createElement('option');
    o.value = c; o.textContent = c;
    if (c === qv) o.selected = true;
    qs.appendChild(o);
  });
}

function setScope(s) {
  tScope = s;
  document.getElementById('ts-mine').className = 'seg-btn'+(s==='mine'?' active':'');
  document.getElementById('ts-all').className  = 'seg-btn'+(s==='all' ?' active':'');
  selectedIds = {};
  updateBulkBar();
  render();
}

function setSort(s) {
  sortMode = s;
  document.getElementById('sort-due').className    = 'seg-btn'+(s==='due'   ?' active':'');
  document.getElementById('sort-staff').className  = 'seg-btn'+(s==='staff' ?' active':'');
  document.getElementById('sort-job').className    = 'seg-btn'+(s==='job'   ?' active':'');
  document.getElementById('sort-status').className = 'seg-btn'+(s==='status'?' active':'');
  document.getElementById('sort-name').className   = 'seg-btn'+(s==='name'  ?' active':'');
  render();
}

function getFiltered() {
  var q         = (document.getElementById('q-search').value   || '').toLowerCase();
  var staffF    = document.getElementById('q-staff').value;
  var clientF   = document.getElementById('q-client').value;
  var categoryF = document.getElementById('q-category').value;
  var statusF   = document.getElementById('q-status').value;

  return tasksData.filter(function(t) {
    if (tScope === 'mine') {
      var isMe = (currentUserUuid && t.staffUuid === currentUserUuid) ||
                 (!currentUserUuid && currentUser && t.staffName.toLowerCase() === currentUser.toLowerCase());
      if (!isMe) return false;
    }
    if (staffF) {
      if (staffF === '__unassigned__') {
        if (t.staffUuid) return false;
      } else {
        if (t.staffUuid !== staffF) return false;
      }
    }
    if (clientF   && t.clientUuid !== clientF)   return false;
    if (categoryF && t.category   !== categoryF) return false;
    if (statusF   && t.jobStatus  !== statusF)   return false;
    if (q) {
      var hay = [t.name, t.section, t.staffName, t.jobNumber, t.clientName, t.category, t.jobStatus].join(' ').toLowerCase();
      if (hay.indexOf(q) === -1) return false;
    }
    return true;
  });
}

function sortTasks(arr) {
  var copy = arr.slice();
  if (sortMode === 'due') {
    copy.sort(function(a, b) {
      var da = a.dueDate || ''; var db = b.dueDate || '';
      if (da && !db) return -1;
      if (!da && db) return  1;
      if (da && db)  return da.localeCompare(db);
      return a.staffName.localeCompare(b.staffName) || a.name.localeCompare(b.name);
    });
  } else if (sortMode === 'staff') {
    copy.sort(function(a, b) {
      var sa = a.staffName === 'Unassigned' ? 'zzz' : a.staffName;
      var sb = b.staffName === 'Unassigned' ? 'zzz' : b.staffName;
      return sa.localeCompare(sb) || (a.dueDate||'zzzz').localeCompare(b.dueDate||'zzzz');
    });
  } else if (sortMode === 'job') {
    copy.sort(function(a, b) {
      return (a.jobNumber||'').localeCompare(b.jobNumber||'') ||
             (a.dueDate||'zzzz').localeCompare(b.dueDate||'zzzz');
    });
  } else if (sortMode === 'status') {
    copy.sort(function(a, b) {
      var oa = STATUS_ORDER[a.jobStatus] !== undefined ? STATUS_ORDER[a.jobStatus] : 99;
      var ob = STATUS_ORDER[b.jobStatus] !== undefined ? STATUS_ORDER[b.jobStatus] : 99;
      return oa - ob ||
             (a.dueDate||'zzzz').localeCompare(b.dueDate||'zzzz') ||
             a.name.localeCompare(b.name);
    });
  } else if (sortMode === 'name') {
    copy.sort(function(a, b) {
      return  a.name.localeCompare(b.name) ||
             (a.dueDate||'zzzz').localeCompare(b.dueDate||'zzzz');
    });
}

  return copy;
}

// ── Bulk selection ─────────────────────────────────────
function toggleSelect(id, checked, event) {
  if (event) event.stopPropagation();
  if (checked) selectedIds[id] = true;
  else delete selectedIds[id];
  var card = document.querySelector('.task-card[data-id="' + id + '"]');
  if (card) card.classList.toggle('selected', !!checked);
  updateBulkBar();
}

function toggleSelectAll(checked) {
  var filtered = getFiltered();
  filtered.forEach(function(t) {
    if (checked) selectedIds[t._id] = true;
    else delete selectedIds[t._id];
  });
  document.querySelectorAll('.task-card[data-id]').forEach(function(card) {
    card.classList.toggle('selected', !!selectedIds[card.dataset.id]);
    var cb = card.querySelector('.bulk-cb');
    if (cb) cb.checked = !!selectedIds[card.dataset.id];
  });
  updateBulkBar();
}

function clearSelection() {
  selectedIds = {};
  document.querySelectorAll('.task-card').forEach(function(c){ c.classList.remove('selected'); });
  document.querySelectorAll('.bulk-cb').forEach(function(cb){ cb.checked = false; });
  var sa = document.getElementById('bulk-select-all');
  if (sa) sa.checked = false;
  updateBulkBar();
}

function updateBulkBar() {
  var count = Object.keys(selectedIds).length;
  var bar   = document.getElementById('bulk-bar');
  var label = document.getElementById('bulk-count');
  if (!bar) return;
  bar.style.display = count > 0 ? 'block' : 'none';
  if (label) label.textContent = count + ' task' + (count===1?'':'s') + ' selected';
  var filtered = getFiltered();
  var sa = document.getElementById('bulk-select-all');
  if (sa) {
    sa.indeterminate = count > 0 && count < filtered.length;
    sa.checked = count > 0 && count === filtered.length;
  }
}

function bulkComplete() {
  var ids = Object.keys(selectedIds);
  if (!ids.length) return;
  if (!confirm('Mark ' + ids.length + ' task' + (ids.length===1?'':'s') + ' as completed in ServiceM8?')) return;

  var now = new Date();
  var ts  = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+
            ' '+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());

  var toComplete = ids.map(function(id){
    return tasksData.find(function(t){ return t._id===id; });
  }).filter(Boolean);

  var label  = document.getElementById('bulk-count');
  var done   = 0;
  var failed = 0;

  function updateProgress() {
    if (label) label.textContent = 'Completing '+(done+failed)+' / '+toComplete.length+'\u2026';
  }

  var promises = toComplete.map(function(t) {
    return sm8Put('/jobchecklist/'+t._id+'.json', buildPayload(t, ts)).then(function(r) {
      if (r.status===200||r.status===201||r.status===204) {
        done++;
        tasksData = tasksData.filter(function(x){ return x._id!==t._id; });
      } else { failed++; }
      updateProgress();
    }).catch(function(){ failed++; updateProgress(); });
  });

  Promise.all(promises).then(function() {
    selectedIds = {};
    populateFilters();
    render();
    toast(failed===0
      ? done+' task'+(done===1?'':'s')+' marked as completed.'
      : done+' completed, '+failed+' failed.', failed>0);
  });
}

// ── Payload builder ────────────────────────────────────
function buildPayload(t, ts) {
  var raw = t._raw;
  return {
    uuid:                          t._id,
    job_uuid:                      raw.job_uuid                      || '',
    name:                          raw.name                          || '',
    section_name:                  raw.section_name                  || '',
    item_type:                     raw.item_type                     || 'Todo',
    sort_order:                    raw.sort_order                    || 0,
    completed_timestamp:           ts,
    completed_by_staff_uuid:       currentUserUuid || t.staffUuid    || '',
    completed_during_checkin_uuid: raw.completed_during_checkin_uuid || '',
    reminder_type:                 raw.reminder_type                 || '',
    reminder_data:                 (raw.reminder_data && !Array.isArray(raw.reminder_data)) ? raw.reminder_data : null,
    regarding_object:              raw.regarding_object              || '',
    regarding_object_uuid:         raw.regarding_object_uuid         || '',
    fulfilled_by_object_name:      raw.fulfilled_by_object_name      || '',
    fulfilled_by_object_uuid:      raw.fulfilled_by_object_uuid      || '',
    assigned_to_staff_uuids:       Array.isArray(raw.assigned_to_staff_uuids) ? raw.assigned_to_staff_uuids : [],
    is_locked:                     raw.is_locked                     || '0'
  };
}

// ── Render ─────────────────────────────────────────────
function render() {
  if (!tasksLoaded) return;
  var filtered = getFiltered();

  var scope = tScope === 'all' ? tasksData : tasksData.filter(function(t) {
    return (currentUserUuid && t.staffUuid === currentUserUuid) ||
           (!currentUserUuid && currentUser && t.staffName.toLowerCase() === currentUser.toLowerCase());
  });
  renderStats(filtered);

  if (!filtered.length) {
    updateBulkBar();
    setBody('<div class="empty-wrap"><div class="empty-icon">&#10003;</div>' +
            '<p>' + (tScope==='mine'
              ? 'No incomplete tasks assigned to you. Try switching to <strong>All Staff</strong>.'
              : 'No tasks match the current filters.') + '</p></div>');
    return;
  }

  var sorted = sortTasks(filtered);

  if (sortMode === 'staff' && tScope === 'all') {
    renderGroupedByStaff(sorted);
  } else if (sortMode === 'status') {
    renderGroupedByStatus(sorted);
  } else {
    var html = '<div class="task-list">';
    sorted.forEach(function(t){ html += taskCard(t); });
    html += '</div>';
    setBody(html);
  }

  updateBulkBar();
}

function renderGroupedByStaff(sorted) {
  var groups = []; var groupMap = {};
  sorted.forEach(function(t) {
    var key = t.staffUuid || '__unassigned__';
    if (!groupMap[key]) {
      groupMap[key] = { staffName:t.staffName, staffColor:t.staffColor, tasks:[] };
      groups.push(groupMap[key]);
    }
    groupMap[key].tasks.push(t);
  });
  var html = '';
  groups.forEach(function(g) {
    html += '<div class="staff-group">'
      + '<div class="staff-group-hdr">'
      + '<span class="staff-avatar" style="background:'+esc(g.staffColor)+'">'+esc(initials(g.staffName))+'</span>'
      + '<span class="staff-group-name">'+esc(g.staffName)+'</span>'
      + '<span class="staff-group-ct">'+g.tasks.length+'</span>'
      + '</div><div class="task-list">';
    g.tasks.forEach(function(t){ html += taskCard(t); });
    html += '</div></div>';
  });
  setBody(html);
}

function renderGroupedByStatus(sorted) {
  var groups = []; var groupMap = {};
  sorted.forEach(function(t) {
    var key = t.jobStatus || '__none__';
    if (!groupMap[key]) {
      groupMap[key] = { status: t.jobStatus || 'No Status', tasks:[] };
      groups.push(groupMap[key]);
    }
    groupMap[key].tasks.push(t);
  });
  var html = '';
  groups.forEach(function(g) {
    html += '<div class="staff-group">'
      + '<div class="staff-group-hdr">'
      + '<span class="group-icon">'+statusIcon(g.status)+'</span>'
      + '<span class="staff-group-name">'+esc(g.status)+'</span>'
      + '<span class="staff-group-ct">'+g.tasks.length+'</span>'
      + '</div><div class="task-list">';
    g.tasks.forEach(function(t){ html += taskCard(t); });
    html += '</div></div>';
  });
  setBody(html);
}

function renderStats(scope) {
  var total      = scope.length;
  var unassigned = scope.filter(function(t){ return !t.staffUuid; }).length;
  var overdue    = scope.filter(function(t){ return t.dueDate && daysUntil(t.dueDate) < 0; }).length;
  var dueToday   = scope.filter(function(t){ return t.dueDate && daysUntil(t.dueDate) === 0; }).length;
  var dueSoon    = scope.filter(function(t){
    var d = t.dueDate ? daysUntil(t.dueDate) : null;
    return d !== null && d > 0 && d <= 7;
  }).length;
  document.getElementById('stats-bar').innerHTML =
    stat(total,      'Tasks',      'var(--text)')  +
    stat(unassigned, 'Unassigned', 'var(--muted)') +
    stat(overdue,    'Overdue',    'var(--red)')    +
    stat(dueToday,   'Due Today',  'var(--amber)')  +
    stat(dueSoon,    'Due Soon',   'var(--accent)');
}

function stat(v, l, c) {
  return '<div class="stat-card"><div class="stat-val" style="color:'+c+'">'+v+
         '</div><div class="stat-lbl">'+l+'</div></div>';
}

// ── Task card ──────────────────────────────────────────
function statusBadge(status) {
  if (!status) return '';
  var cls = 'status-wo';
  if (status === 'Quote')        cls = 'status-quote';
  if (status === 'Completed')    cls = 'status-completed';
  if (status === 'Unsuccessful') cls = 'status-unsuccessful';
  return '<span class="badge '+cls+'">'+esc(status)+'</span>';
}

function statusIcon(status) {
  if (status === 'Work Order')   return '&#127959;';
  if (status === 'Quote')        return '&#128203;';
  if (status === 'Completed')    return '&#10003;';
  if (status === 'Unsuccessful') return '&#10007;';
  return '&#9679;';
}

function taskCard(t) {
  var d          = t.dueDate ? daysUntil(t.dueDate) : null;
  var isOverdue  = d !== null && d < 0;
  var colorCls   = isOverdue ? 'c-overdue' : 'c-active';
  var isSelected = !!selectedIds[t._id];

  var sm8Btn = t.jobUuidSm8
    ? '<a class="open-sm8-btn" href="https://go.servicem8.com/job_card.html#edit,uuid='+esc(t.jobUuidSm8)+
      '" target="_blank" rel="noopener" onclick="event.stopPropagation()">&#128279; Open Job</a>'
    : '';

  var dateDisplay = t.dueDate ? '<span>&#128336; Due '+fmtDate(t.dueDate)+'</span>' : '';

  var staffChip = '<span class="staff-chip" style="background:'+esc(t.staffColor)+'22;border-color:'+esc(t.staffColor)+'55;">'
    + '<span class="staff-chip-dot" style="background:'+esc(t.staffColor)+'"></span>'
    + esc(t.staffName)+'</span>';

  return '<div class="task-card '+colorCls+(isSelected?' selected':'')+'" data-id="'+esc(t._id)+'" onclick="openEdit(\''+esc(t._id)+'\')">'
    + '<input type="checkbox" class="bulk-cb task-cb" onclick="event.stopPropagation()" onchange="toggleSelect(\''+esc(t._id)+'\',this.checked,event)"'+(isSelected?' checked':'')+'/>'
    + '<div class="task-body">'
    + '<div class="title-row">'
    + '<span class="task-title">'+esc(t.name)+'</span>'
    + '<span class="badge task">Task</span>'
    + statusBadge(t.jobStatus)
    + (t.section ? '<span class="badge section">'+esc(t.section)+'</span>' : '')
    + (isOverdue ? '<span class="badge overdue">Overdue</span>' : '')
    + '</div>'
    + '<div class="meta-row">'
    + staffChip
    + (t.category   ? '<span>&#127991; '+esc(t.category)+'</span>'   : '')
    + (t.clientName ? '<span>&#128205; '+esc(t.clientName)+'</span>' : '')
    + (t.jobNumber  ? '<span>&#128188; Job #'+esc(t.jobNumber)+(t.jobDesc?' &mdash; '+esc(t.jobDesc.substring(0,40)):'')+' </span>' : '')
    + dateDisplay
    + '</div>'
    + '</div>'
    + '<div class="task-right">'+duePill(t)+sm8Btn+'</div>'
    + '</div>';
}

function duePill(t) {
  if (!t.dueDate) return '<span class="due-pill none">No date</span>';
  var d = daysUntil(t.dueDate);
  if (d === null) return '';
  if (d < 0)   return '<span class="due-pill overdue">&#9888; '+Math.abs(d)+'d overdue</span>';
  if (d === 0) return '<span class="due-pill today">Due today</span>';
  if (d <= 7)  return '<span class="due-pill soon">'+d+'d left</span>';
  return '<span class="due-pill ok">'+fmtDate(t.dueDate)+'</span>';
}

// ── Mark complete ──────────────────────────────────────
function markComplete(t) {
  var now = new Date();
  var ts  = now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+
            ' '+pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());
  sm8Put('/jobchecklist/'+t._id+'.json', buildPayload(t, ts)).then(function(r) {
    if (r.status===200||r.status===201||r.status===204) {
      tasksData = tasksData.filter(function(x){ return x._id!==t._id; });
      delete selectedIds[t._id];
      populateFilters();
      closeModal();
      render();
      toast('Task marked as completed.');
    } else {
      r.text().then(function(txt){
        toast('Save failed: HTTP '+r.status+' \u2014 '+txt.substring(0,120), true);
      });
    }
  }).catch(function(e){ toast('Save failed: '+e.message, true); });
}

// ── Edit modal ─────────────────────────────────────────
function openEdit(id) {
  var t = tasksData.find(function(x){ return x._id===id; });
  if (!t) return;
  editRecord = t;

  var sm8Link = document.getElementById('m-sm8-link');
  if (t.jobUuidSm8) {
    sm8Link.href = 'https://go.servicem8.com/job_card.html#edit,uuid='+t.jobUuidSm8;
    sm8Link.innerHTML = '&#128279; Open Job #'+esc(t.jobNumber)+' in ServiceM8';
    sm8Link.style.display = 'inline-flex';
  } else { sm8Link.style.display='none'; }

  // Editable fields
  document.getElementById('m-name').value = t.name;
  document.getElementById('m-due-date').value = t.dueDate || '';
  updateDuePreview();

  var statusRow = document.getElementById('m-status-row');
  if (t.jobStatus) {
    statusRow.style.display='';
    document.getElementById('m-status').innerHTML = statusBadge(t.jobStatus);
  } else { statusRow.style.display='none'; }

  var catRow = document.getElementById('m-category-row');
  if (t.category) { catRow.style.display=''; document.getElementById('m-category').textContent=t.category; }
  else { catRow.style.display='none'; }

  var secRow = document.getElementById('m-section-row');
  if (t.section) { secRow.style.display=''; document.getElementById('m-section').textContent=t.section; }
  else { secRow.style.display='none'; }

  var jobRow = document.getElementById('m-job-row');
  if (t.jobNumber) {
    jobRow.style.display='';
    document.getElementById('m-job-display').textContent = 'Job #'+t.jobNumber+(t.jobDesc?' \u2014 '+t.jobDesc:'');
  } else { jobRow.style.display='none'; }

  document.getElementById('m-staff-display').innerHTML =
    '<span class="staff-chip" style="background:'+esc(t.staffColor)+'22;border-color:'+esc(t.staffColor)+'55;">'
    +'<span class="staff-chip-dot" style="background:'+esc(t.staffColor)+'"></span>'
    +esc(t.staffName)+'</span>';

  var remRow = document.getElementById('m-reminder-row');
  if (t.reminderType) {
    remRow.style.display='';
    document.getElementById('m-reminder').textContent = t.reminderType+(t.reminderData?': '+t.reminderData:'');
  } else { remRow.style.display='none'; }

  document.getElementById('m-raw').value = JSON.stringify(t._raw, null, 2);

  // Reset save message
  setSaveMsg('', '');
  openModal();
}

function updateDuePreview() {
  var val = document.getElementById('m-due-date').value;
  var el  = document.getElementById('m-due-preview');
  if (!val) { el.textContent = 'No due date set'; return; }
  var d = daysUntil(val);
  if (d === null) { el.textContent = ''; return; }
  if (d < 0)  el.textContent = Math.abs(d) + ' day' + (Math.abs(d)===1?'':'s') + ' overdue';
  else if (d === 0) el.textContent = 'Due today';
  else el.textContent = 'Due in ' + d + ' day' + (d===1?'':'s');
}

function clearDueDate() {
  document.getElementById('m-due-date').value = '';
  updateDuePreview();
}

function setSaveMsg(msg, type) {
  var el = document.getElementById('m-save-msg');
  el.textContent = msg;
  el.style.color = type === 'error' ? 'var(--red)'
                 : type === 'ok'    ? 'var(--green)'
                 : type === 'saving'? 'var(--amber)'
                 : 'transparent';
}

function saveTaskEdits() {
  if (!editRecord) return;

  var newName    = document.getElementById('m-name').value.trim();
  var newDueDate = document.getElementById('m-due-date').value; // 'YYYY-MM-DD' or ''

  if (!newName) { setSaveMsg('Task name cannot be empty.', 'error'); return; }

  setSaveMsg('Saving\u2026', 'saving');
  document.getElementById('m-save-btn').disabled = true;

  var t   = editRecord;
  var raw = t._raw;

  // Build updated reminder_data
  var reminderType = raw.reminder_type || '';
  var reminderData = raw.reminder_data;

  if (newDueDate) {
    // Set or update to ABSOLUTE_DATETIME
    reminderType = 'ABSOLUTE_DATETIME';
    // Preserve existing time if it was already an absolute datetime, else default to 08:00:00
    var existingTime = '08:00:00';
    if (raw.reminder_data && typeof raw.reminder_data === 'object' && raw.reminder_data.absoluteDateTime) {
      var timePart = String(raw.reminder_data.absoluteDateTime).substring(11);
      if (timePart) existingTime = timePart;
    }
    reminderData = { absoluteDateTime: newDueDate + ' ' + existingTime };
  } else {
    // Clearing the due date — remove reminder entirely
    reminderType = '';
    reminderData = null;
  }

  var payload = {
    uuid:                          t._id,
    job_uuid:                      raw.job_uuid                      || '',
    name:                          newName,
    section_name:                  raw.section_name                  || '',
    item_type:                     raw.item_type                     || 'Todo',
    sort_order:                    raw.sort_order                    || 0,
    completed_timestamp:           raw.completed_timestamp           || '',
    completed_by_staff_uuid:       raw.completed_by_staff_uuid       || '',
    completed_during_checkin_uuid: raw.completed_during_checkin_uuid || '',
    reminder_type:                 reminderType,
    reminder_data:                 reminderData,
    regarding_object:              raw.regarding_object              || '',
    regarding_object_uuid:         raw.regarding_object_uuid         || '',
    fulfilled_by_object_name:      raw.fulfilled_by_object_name      || '',
    fulfilled_by_object_uuid:      raw.fulfilled_by_object_uuid      || '',
    assigned_to_staff_uuids:       Array.isArray(raw.assigned_to_staff_uuids) ? raw.assigned_to_staff_uuids : [],
    is_locked:                     raw.is_locked                     || '0'
  };

  sm8Put('/jobchecklist/' + t._id + '.json', payload).then(function(r) {
    document.getElementById('m-save-btn').disabled = false;
    if (r.status === 200 || r.status === 201 || r.status === 204) {
      // Update local data so card re-renders correctly without a full reload
      t.name         = newName;
      t.dueDate      = newDueDate;
      t.reminderType = reminderType;
      t.reminderData = newDueDate ? (newDueDate + ' ' + (reminderData ? reminderData.absoluteDateTime.substring(11) : '08:00:00')) : '';
      if (reminderData) {
        t._raw.reminder_data = reminderData;
        t._raw.reminder_type = reminderType;
      } else {
        t._raw.reminder_data = null;
        t._raw.reminder_type = '';
      }
      t._raw.name = newName;

      // Update raw textarea
      document.getElementById('m-raw').value = JSON.stringify(t._raw, null, 2);

      setSaveMsg('Saved successfully.', 'ok');
      render();
      toast('Task updated.');
    } else {
      r.text().then(function(txt) {
        setSaveMsg('Save failed: ' + txt.substring(0, 80), 'error');
        toast('Save failed: HTTP ' + r.status, true);
      });
    }
  }).catch(function(e) {
    document.getElementById('m-save-btn').disabled = false;
    setSaveMsg('Save failed: ' + e.message, 'error');
    toast('Save failed: ' + e.message, true);
  });
}

function completeFromModal() {
  if (!editRecord) return;
  if (!confirm('Mark "'+editRecord.name+'" as completed in ServiceM8?')) return;
  markComplete(editRecord);
}

function openModal()  { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); editRecord=null; }
function onOverlayClick(e) { if (e.target===document.getElementById('modal')) closeModal(); }

// ── Helpers ────────────────────────────────────────────
function initials(name) {
  if (!name || name==='Unassigned') return '?';
  var parts = name.trim().split(/\s+/);
  if (parts.length===1) return parts[0].substring(0,2).toUpperCase();
  return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}
function daysUntil(str) {
  if (!str) return null;
  var m = String(str).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return null;
  var d = new Date(+m[1],+m[2]-1,+m[3]);
  var now = new Date(); now.setHours(0,0,0,0); d.setHours(0,0,0,0);
  return Math.round((d-now)/86400000);
}
function fmtDate(str) {
  if (!str) return '\u2014';
  var m = String(str).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return str;
  return new Date(+m[1],+m[2]-1,+m[3]).toLocaleDateString('en-AU',{day:'2-digit',month:'short',year:'numeric'});
}
function pad(n) { return n<10?'0'+n:String(n); }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function setBody(html)    { document.getElementById('task-body').innerHTML=html; }
function setSyncMsg(html) { document.getElementById('sync-detail').innerHTML=html; }

var toastTimer = null;
function toast(msg, isError) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = isError ? 'var(--red)' : 'var(--green)';
  el.style.color       = isError ? 'var(--red)' : 'var(--text)';
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 3500);
}
</script>
